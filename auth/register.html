<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>初回利用者登録 | PoCKet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="page-transition fade-in">

<div id="header-wrapper">
  <header id="main-header">
    <div class="header-content">
      <a href="../index.html">
        <img src="../assets/images/club-icon.JPG" alt="ロゴ" class="logo">
        <div class="site-title">
          <h1>PoCKet 利用者登録</h1>
          <p>Photo Club Koganei Equipment Terminal</p>
        </div>
      </a>
    </div>
  </header>

  <nav class="navbar">
    <ul>
      <li><a href="./login.html">ログイン</a></li>
      <li><a href="#" class="disabled">初回登録</a></li>
    </ul>
  </nav>
</div>

<main>
  <section class="camera-center-section">
    <h2>初回利用者登録</h2>

    <div class="camera-description">
      <p id="reg-email" style="font-weight:bold;"></p>
      <p>以下の情報は、貸出管理のために部内でのみ利用します。</p>
    </div>

    <div class="c-section__container" style="max-width:420px; margin:0 auto;">
      <label>氏名（名字と名前の間に半角スペースを入れてください。）</label><br>
      <input id="reg-name" type="text" style="width:100%; padding:8px;"><br><br>

      <label>LINE 表示名</label><br>
      <input id="reg-line" type="text" style="width:100%; padding:8px;"><br><br>

      <label>学年</label><br>
      <select id="reg-grade" style="width:100%; padding:8px;">
        <option value="1">B1</option>
        <option value="2">B2</option>
        <option value="3">B3</option>
        <option value="4">B4</option>
        <option value="5">M1</option>
        <option value="6">M2</option>
      </select>
      <br><br>

      <!-- 役職選択なし（管理者を登録後にコメントアウトする）-->
      <!-- <label>役職</label><br>
      <select id="reg-role" style="width:100%; padding:8px;">
        <option value="0">役職なし</option>
        <option value="1">部長</option>
        <option value="2">副部長</option>
        <option value="3">会計</option>
        <option value="4">文連</option>
      </select> -->
      <br><br>

      <button class="button" onclick="sendRegister()">登録する</button>
    </div>
  </section>
</main>

<footer>
  <p>&copy; 2025-2026 写真技術研究会 PoCKet</p>
</footer>

<script>
const USER_API =
  "https://script.google.com/macros/s/AKfycbxWNWz8aIr_8DqTTHsk9y089ZLZO6B8m2ywd6e1kCWi6Fyhr4AIOcS5QwdXpHxjx8w/exec";

const email = sessionStorage.getItem("email");
document.getElementById("reg-email").textContent =
  email ? ("メールアドレス: " + email) : "メールアドレス情報が取得できませんでした。";

async function sendRegister() {
  const email = sessionStorage.getItem("email"); // ← 取得し忘れ対応

  const payload = {
    mode: "register",
    email,
    name: document.getElementById("reg-name").value.trim(),
    lineName: document.getElementById("reg-line").value.trim(),
    grade: document.getElementById("reg-grade").value,
    role: 0   // ★自動で役職なし
    // role: document.getElementById("reg-role").value
    // ↑役職なし対応(管理者登録後にコメントアウト)
  };

  if (!payload.email || !payload.name || !payload.lineName) {
    alert("⚠️ 入力項目が不足しています。");
    return;
  }

  const res = await fetch(USER_API, {
    method: "POST",
    // Content-Typeは付けない！（CORS対策）
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (data.result === "registered") {
    alert("登録が完了しました！🎉 ログイン画面へ戻ります");
    sessionStorage.removeItem("email");
    window.location.href = "/reserve_site/auth/login.html";
  } else {
    alert("⚠️ 登録エラー: " + (data.message ?? "Unknown Error"));
  }
}
</script>
</body>
</html>
